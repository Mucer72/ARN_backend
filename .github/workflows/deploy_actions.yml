name: Build & Push Docker Images

on:
  push:
    branches: [ "main" ]
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Auth service env
        run: |
          cat <<EOF > auth-service/.env
          DATABASE_URL = ${{ vars.DATABASE_URL }}
          MAX_DEVICES = ${{ vars.MAX_DEVICES }}
          REFRESH_TOKEN_EXPIRATION = ${{ vars.REFRESH_TOKEN_EXPIRATION }}
          JWT_SECRET:${{ secrets.JWT_SECRET }}
          EOF

      - name: API gateway env
        run: |
          cat <<EOF > api-gateway/.env
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          AUTH_SERVICE_URL = ${{ vars.AUTH_SERVICE_URL }}
          EOF
          
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push auth-service
        run: |
          docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest \
          -f auth-service/dockerfile \
          . \
          --push

      - name: Build & push api-gateway
        run: |
          docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest \
          -f api-gateway/dockerfile \
          . \
          --push
