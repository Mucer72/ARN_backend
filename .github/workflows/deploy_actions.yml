name: Build, Push & Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login Docker Hub
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. Setup buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build & push auth-service
      - name: Build & push auth-service
        run: |
          docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest \
          -f auth-service/dockerfile \
          . \
          --push

      # 5. Build & push api-gateway
      - name: Build & push api-gateway
        run: |
          docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest \
          -f api-gateway/dockerfile \
          . \
          --push

      # 6. Deploy lên EC2 + inject env
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app

            # ===== Tạo ENV FILE =====
            mkdir -p auth-service api-gateway

            cat <<EOF > auth-service/.env
            DATABASE_URL=${{ vars.DATABASE_URL }}
            MAX_DEVICES=${{ vars.MAX_DEVICES }}
            REFRESH_TOKEN_EXPIRATION=${{ vars.REFRESH_TOKEN_EXPIRATION }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF

            cat <<EOF > api-gateway/.env
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            AUTH_SERVICE_URL=${{ vars.AUTH_SERVICE_URL }}
            EOF

            # ===== Pull image mới =====
            docker pull ${{ secrets.DOCKER_USERNAME }}/auth-service:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest

            # ===== Restart container =====
            docker compose down
            docker compose up -d
